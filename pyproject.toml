[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "whipsnake-circuitpython"
version = "0.1.0a1"
description = "CircuitPython stdlib flavor for Whipsnake"
requires-python = ">=3.11"

[tool.hatch.build.targets.wheel]
packages = ["src/whipsnake_circuitpython"]
